<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-xl">
    <h1 class="text-2xl font-bold mb-4 text-indigo-600 text-center">Employee Management System</h1>

    <div id="login-section">
      <input id="email" placeholder="Admin Email" class="border p-2 w-full mb-2 rounded" />
      <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-2 rounded" />
      <button onclick="login()" class="bg-indigo-500 text-white w-full py-2 rounded">Login</button>
    </div>

    <div id="app" class="hidden">
      <div class="mb-4">
        <input id="name" placeholder="Employee Name" class="border p-2 w-full mb-2 rounded" />
        <input id="empEmail" placeholder="Employee Email" class="border p-2 w-full mb-2 rounded" />
        <button onclick="addEmployee()" class="bg-green-500 text-white w-full py-2 rounded">Add Employee</button>
      </div>
      <ul id="list" class="divide-y"></ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
